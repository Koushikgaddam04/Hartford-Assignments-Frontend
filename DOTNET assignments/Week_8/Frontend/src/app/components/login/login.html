<div class="min-h-screen flex items-center justify-center bg-slate-100 p-4">
  <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-200">
    <h2 class="text-3xl font-black text-blue-900 mb-2 text-center">Insurance Portal</h2>
    <p class="text-slate-500 text-center mb-8">Please sign in to continue</p>
    
    <form (submit)="onLogin()" class="space-y-5">
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-1">Email</label>
        <input type="email" [(ngModel)]="loginData.email" name="email" 
               class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
      </div>
      
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-1">Password</label>
        <input type="password" [(ngModel)]="loginData.password" name="password" 
               class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
      </div>

      <div class="bg-slate-50 p-4 rounded-xl border-2 border-dashed border-slate-300">
        <div class="flex justify-between items-center mb-3">
          <span class="text-xs font-bold uppercase text-slate-400">Security Code</span>
          <span class="font-mono text-xl font-black tracking-widest text-blue-700 bg-white px-4 py-1 rounded shadow-inner">
            {{generatedCaptcha}}
          </span>
        </div>
        <input type="text" [(ngModel)]="loginData.userCaptcha" name="userCaptcha" 
               placeholder="Type the code here" 
               class="w-full p-2 border rounded-lg text-center font-bold tracking-widest uppercase">
      </div>

      <button type="submit" 
              class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold hover:bg-blue-800 transition-all shadow-lg active:scale-95">
        Login
      </button>

      <p class="text-center text-sm text-slate-500 mt-4">
        New user? <a routerLink="/register" class="text-blue-700 font-bold hover:underline">Create an account</a>
      </p>
    </form>
  </div>
</div>
