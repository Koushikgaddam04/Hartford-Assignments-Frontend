<div class="min-h-screen flex items-center justify-center bg-slate-100 p-4">
  <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-200">
    <h2 class="text-3xl font-black text-blue-900 mb-2 text-center">Create Account</h2>
    <p class="text-slate-500 text-center mb-8">Join the Insurance Portal</p>
    
    <form (submit)="onRegister()" class="space-y-4">
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-1">Full Name</label>
        <input type="text" [(ngModel)]="user.fullName" name="fullName" required
               class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-1">Email Address</label>
        <input type="email" [(ngModel)]="user.email" name="email" required
               class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-1">Password</label>
        <input type="password" [(ngModel)]="user.password" name="password" required
               class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-1">Register as a...</label>
        <select [(ngModel)]="user.role" name="role" 
                class="w-full p-3 border rounded-xl bg-white focus:ring-2 focus:ring-blue-500 outline-none transition cursor-pointer">
          <option value="Customer">Customer</option>
          <option value="Agent">Agent</option>
          <option value="Admin">Admin</option>
        </select>
      </div>

      <button type="submit" 
              class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold hover:bg-blue-800 transition-all shadow-lg active:scale-95 mt-4">
        Sign Up
      </button>

      <p class="text-center text-sm text-slate-500 mt-4">
        Already have an account? <a routerLink="/login" class="text-blue-700 font-bold hover:underline">Login here</a>
      </p>
    </form>
  </div>
</div>
